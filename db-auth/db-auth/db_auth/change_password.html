<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Change password</title>
  <style>body { font-family: 'Comic Sans MS'; }</style>
</head>
<body>
  <h3>Change password</h3>
  {message}
  <form method="post">
    <label>User: <input name="user" required /></label><br /><br />
    <label>Old password: <input type="password" name="old_password" required /></label><br /><br />
    <label>New password: <input type="password" name="new_password" required /></label><br /><br />
    <button type="submit">Change</button>
  </form>
</body>
</html>
